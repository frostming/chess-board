<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chinese Chess Board</title>
<link rel="stylesheet" href="css/common.css">
<style>
@font-face {
  font-family: 'Jinghua';
  src: url(https://frostming.github.io/jinghua-webfont/css/京華老宋体v2.002.ttf) format('truetype');
}
</style>
</head>
<body>
<div class="container">
  <canvas id="board"></canvas>
  <div class="toolbar" id="toolbar"></div>
  <div class="info" id="info"></div>
</div>
<script src="js/common.js"></script>
<script>
const PIECE_MAP = {
  K: { ch: '帥', color: 'red' },
  k: { ch: '將', color: 'black' },
  A: { ch: '仕', color: 'red' },
  a: { ch: '士', color: 'black' },
  B: { ch: '相', color: 'red' },
  b: { ch: '象', color: 'black' },
  N: { ch: '馬', color: 'red' },
  n: { ch: '馬', color: 'black' },
  R: { ch: '車', color: 'red' },
  r: { ch: '車', color: 'black' },
  C: { ch: '炮', color: 'red' },
  c: { ch: '砲', color: 'black' },
  P: { ch: '兵', color: 'red' },
  p: { ch: '卒', color: 'black' },
};

function drawBoard(board) {
  const canvas = document.getElementById('board');
  const cellSize = 64;
  const padding = 40;
  const cols = 9;
  const rows = 10;
  const w = (cols - 1) * cellSize + padding * 2;
  const h = (rows - 1) * cellSize + padding * 2;
  const ctx = setupCanvas(canvas, w, h);

  // Background
  ctx.fillStyle = '#f0d9b5';
  ctx.fillRect(0, 0, w, h);

  function gx(col) { return padding + col * cellSize; }
  function gy(row) { return padding + row * cellSize; }

  // Grid
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;

  for (let r = 0; r < rows; r++) {
    ctx.beginPath();
    ctx.moveTo(gx(0), gy(r));
    ctx.lineTo(gx(cols - 1), gy(r));
    ctx.stroke();
  }

  for (let c = 0; c < cols; c++) {
    if (c === 0 || c === cols - 1) {
      ctx.beginPath();
      ctx.moveTo(gx(c), gy(0));
      ctx.lineTo(gx(c), gy(rows - 1));
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(gx(c), gy(0));
      ctx.lineTo(gx(c), gy(4));
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(gx(c), gy(5));
      ctx.lineTo(gx(c), gy(rows - 1));
      ctx.stroke();
    }
  }

  // Palace diagonals
  ctx.beginPath();
  ctx.moveTo(gx(3), gy(0)); ctx.lineTo(gx(5), gy(2));
  ctx.moveTo(gx(5), gy(0)); ctx.lineTo(gx(3), gy(2));
  ctx.moveTo(gx(3), gy(7)); ctx.lineTo(gx(5), gy(9));
  ctx.moveTo(gx(5), gy(7)); ctx.lineTo(gx(3), gy(9));
  ctx.stroke();

  // River text
  ctx.fillStyle = '#333';
  ctx.font = `bold ${cellSize * 0.45}px "Jinghua", serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const riverY = (gy(4) + gy(5)) / 2;
  ctx.fillText('楚 河', gx(1.5), riverY);
  ctx.fillText('漢 界', gx(6.5), riverY);

  // Pieces
  const pieceRadius = cellSize * 0.42;
  for (let r = 0; r < 10; r++) {
    for (let c = 0; c < 9; c++) {
      const piece = board[r][c];
      if (!piece) continue;
      const info = PIECE_MAP[piece];
      const x = gx(c);
      const y = gy(r);

      ctx.beginPath();
      ctx.arc(x, y, pieceRadius, 0, Math.PI * 2);
      ctx.fillStyle = '#fae6c0';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = info.color === 'red' ? '#c00' : '#222';
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(x, y, pieceRadius - 4, 0, Math.PI * 2);
      ctx.strokeStyle = info.color === 'red' ? '#c00' : '#222';
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.fillStyle = info.color === 'red' ? '#c00' : '#222';
      ctx.font = `bold ${cellSize * 0.42}px "Jinghua", "Noto Serif SC", "Songti SC", "SimSun", serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(info.ch, x, y + 1);
    }
  }
}

document.fonts.ready.then(() => main({
  pieceMap: PIECE_MAP,
  rows: 10,
  cols: 9,
  defaultFEN: 'rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR',
  drawBoard,
}));
</script>
</body>
</html>
