<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Board</title>
<link rel="stylesheet" href="css/common.css">
</head>
<body>
<div class="container">
  <canvas id="board"></canvas>
  <div class="toolbar" id="toolbar"></div>
  <div class="info" id="info"></div>
</div>
<script src="js/common.js"></script>
<script>
const PIECE_MAP = {
  K: { symbol: '\u2654', color: 'white' },
  Q: { symbol: '\u2655', color: 'white' },
  R: { symbol: '\u2656', color: 'white' },
  B: { symbol: '\u2657', color: 'white' },
  N: { symbol: '\u2658', color: 'white' },
  P: { symbol: '\u2659', color: 'white' },
  k: { symbol: '\u265A', color: 'black' },
  q: { symbol: '\u265B', color: 'black' },
  r: { symbol: '\u265C', color: 'black' },
  b: { symbol: '\u265D', color: 'black' },
  n: { symbol: '\u265E', color: 'black' },
  p: { symbol: '\u265F', color: 'black' },
};

function drawBoard(board) {
  const canvas = document.getElementById('board');
  const cellSize = 72;
  const padding = 32;
  const size = 8;
  const w = size * cellSize + padding * 2;
  const h = w;
  const ctx = setupCanvas(canvas, w, h);

  const lightColor = '#f0d9b5';
  const darkColor = '#b58863';

  // Background
  ctx.fillStyle = '#8b6b4a';
  ctx.fillRect(0, 0, w, h);

  function sx(col) { return padding + col * cellSize; }
  function sy(row) { return padding + row * cellSize; }

  // Draw squares
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? lightColor : darkColor;
      ctx.fillRect(sx(c), sy(r), cellSize, cellSize);
    }
  }

  // Rank and file labels
  ctx.font = `bold 12px sans-serif`;
  ctx.textBaseline = 'middle';
  const files = 'abcdefgh';
  for (let c = 0; c < size; c++) {
    const color = c % 2 === 0 ? darkColor : lightColor;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.fillText(files[c], sx(c) + cellSize / 2, h - padding / 2);
  }
  for (let r = 0; r < size; r++) {
    const color = r % 2 === 0 ? lightColor : darkColor;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.fillText(String(8 - r), padding / 2, sy(r) + cellSize / 2);
  }

  // Draw pieces
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const fontSize = cellSize * 0.7;

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const piece = board[r][c];
      if (!piece) continue;
      const info = PIECE_MAP[piece];
      const x = sx(c) + cellSize / 2;
      const y = sy(r) + cellSize / 2;

      // Drop shadow for readability
      ctx.font = `${fontSize}px serif`;
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillText(info.symbol, x + 1, y + 2);

      // Piece
      ctx.fillStyle = info.color === 'white' ? '#fff' : '#111';
      ctx.fillText(info.symbol, x, y);
    }
  }
}

main({
  pieceMap: PIECE_MAP,
  rows: 8,
  cols: 8,
  defaultFEN: 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR',
  drawBoard,
});
</script>
</body>
</html>
